services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: threat-hunter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: thm
      POSTGRES_PASSWORD: thm_dev_password
      POSTGRES_DB: threathunter
    ports: 
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:        
